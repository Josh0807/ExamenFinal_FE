[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to MonsterASP backend (avoids HTTPS -> HTTP mixed content).
[[redirects]]
  from = "/api/*"
  to = "http://examenfinalbe.runasp.net/api/:splat"
  status = 200
  force = true

# SPA fallback for React Router.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
